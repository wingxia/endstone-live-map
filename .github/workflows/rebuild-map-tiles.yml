name: rebuild-map-tiles

concurrency:
  group: rebuild-map-tiles-production
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      worker_url:
        description: Worker URL
        required: true
        default: https://map.buhe.li
      mode:
        description: audit, repair, or rebuild
        required: false
        default: rebuild
      world:
        description: Optional world filter
        required: false
        default: ""
      dimension:
        description: Optional dimension filter
        required: false
        default: ""
      delete_existing:
        description: After rebuilding, remove stale map tile objects in the requested scope
        required: true
        type: boolean
        default: false
      concurrency:
        description: Audit/rebuild scan concurrency
        required: false
        default: "2"
      catalog_limit:
        description: Chunk catalog page size
        required: false
        default: "25"
      zoom:
        description: Optional single zoom level to rebuild
        required: false
        default: ""
      min_chunk_x:
        description: Optional chunk range min X
        required: false
        default: ""
      max_chunk_x:
        description: Optional chunk range max X
        required: false
        default: ""
      min_chunk_z:
        description: Optional chunk range min Z
        required: false
        default: ""
      max_chunk_z:
        description: Optional chunk range max Z
        required: false
        default: ""
      skip_audit:
        description: Skip final audit for partial rebuild shards
        required: false
        type: boolean
        default: false
      touch_meta:
        description: Touch world metadata before final audit
        required: false
        type: boolean
        default: false
      fail_on_mismatch:
        description: Fail audit mode when mismatches are found
        required: false
        type: boolean
        default: true

jobs:
  rebuild:
    name: Rebuild map image tiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate inputs
        run: |
          test -n "${{ secrets.PLUGIN_TOKEN }}" || (echo "Missing PLUGIN_TOKEN secret" && exit 1)
      - name: Rebuild from z4
        env:
          PLUGIN_TOKEN: ${{ secrets.PLUGIN_TOKEN }}
          MODE: ${{ inputs.mode }}
          WORKER_URL: ${{ inputs.worker_url }}
          WORLD: ${{ inputs.world }}
          DIMENSION: ${{ inputs.dimension }}
          CONCURRENCY: ${{ inputs.concurrency }}
          CATALOG_LIMIT: ${{ inputs.catalog_limit }}
          ZOOM: ${{ inputs.zoom }}
          MIN_CHUNK_X: ${{ inputs.min_chunk_x }}
          MAX_CHUNK_X: ${{ inputs.max_chunk_x }}
          MIN_CHUNK_Z: ${{ inputs.min_chunk_z }}
          MAX_CHUNK_Z: ${{ inputs.max_chunk_z }}
          DELETE_EXISTING: ${{ inputs.delete_existing }}
          SKIP_AUDIT: ${{ inputs.skip_audit }}
          TOUCH_META: ${{ inputs.touch_meta }}
          FAIL_ON_MISMATCH: ${{ inputs.fail_on_mismatch }}
        run: |
          args=("$MODE" --worker-url "$WORKER_URL" --concurrency "$CONCURRENCY" --catalog-limit "$CATALOG_LIMIT" --request-timeout-ms 60000 --request-retries 4)
          if [ "$DELETE_EXISTING" = "true" ]; then
            args+=(--delete-existing)
          fi
          if [ "$SKIP_AUDIT" = "true" ]; then
            args+=(--skip-audit)
          fi
          if [ "$TOUCH_META" = "true" ]; then
            args+=(--touch-meta)
          fi
          if [ "$FAIL_ON_MISMATCH" = "true" ]; then
            args+=(--fail-on-mismatch)
          fi
          if [ -n "$WORLD" ]; then
            args+=(--world "$WORLD")
          fi
          if [ -n "$DIMENSION" ]; then
            args+=(--dimension "$DIMENSION")
          fi
          if [ -n "$ZOOM" ]; then
            args+=(--zoom "$ZOOM")
          fi
          if [ -n "$MIN_CHUNK_X" ] || [ -n "$MAX_CHUNK_X" ] || [ -n "$MIN_CHUNK_Z" ] || [ -n "$MAX_CHUNK_Z" ]; then
            args+=(--min-chunk-x "$MIN_CHUNK_X" --max-chunk-x "$MAX_CHUNK_X" --min-chunk-z "$MIN_CHUNK_Z" --max-chunk-z "$MAX_CHUNK_Z")
          fi
          node scripts/audit-map-tiles.mjs "${args[@]}"
