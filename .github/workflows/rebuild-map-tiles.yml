name: rebuild-map-tiles

on:
  workflow_dispatch:
    inputs:
      worker_url:
        description: Worker URL
        required: true
        default: https://map.buhe.li
      world:
        description: Optional world filter
        required: false
        default: ""
      dimension:
        description: Optional dimension filter
        required: false
        default: ""
      delete_existing:
        description: Delete existing map-tiles/v1 objects before rebuilding
        required: true
        type: boolean
        default: false
      concurrency:
        description: Audit/rebuild scan concurrency
        required: false
        default: "2"
      catalog_limit:
        description: Chunk catalog page size
        required: false
        default: "25"

jobs:
  rebuild:
    name: Rebuild map image tiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate inputs
        run: |
          test -n "${{ secrets.PLUGIN_TOKEN }}" || (echo "Missing PLUGIN_TOKEN secret" && exit 1)
      - name: Rebuild from z4
        env:
          PLUGIN_TOKEN: ${{ secrets.PLUGIN_TOKEN }}
          WORKER_URL: ${{ inputs.worker_url }}
          WORLD: ${{ inputs.world }}
          DIMENSION: ${{ inputs.dimension }}
          CONCURRENCY: ${{ inputs.concurrency }}
          CATALOG_LIMIT: ${{ inputs.catalog_limit }}
          DELETE_EXISTING: ${{ inputs.delete_existing }}
        run: |
          args=(rebuild --worker-url "$WORKER_URL" --concurrency "$CONCURRENCY" --catalog-limit "$CATALOG_LIMIT" --request-timeout-ms 60000 --request-retries 4)
          if [ "$DELETE_EXISTING" = "true" ]; then
            args+=(--delete-existing)
          fi
          if [ -n "$WORLD" ]; then
            args+=(--world "$WORLD")
          fi
          if [ -n "$DIMENSION" ]; then
            args+=(--dimension "$DIMENSION")
          fi
          node scripts/audit-map-tiles.mjs "${args[@]}"
