name: rebuild-map-tiles

on:
  workflow_dispatch:
    inputs:
      worker_url:
        description: Worker URL
        required: true
        default: https://map.buhe.li
      world:
        description: Optional world filter
        required: false
        default: ""
      dimension:
        description: Optional dimension filter
        required: false
        default: ""
      delete_existing:
        description: Delete existing map-tiles/v1 objects before rebuilding
        required: true
        type: boolean
        default: false
      concurrency:
        description: Audit/rebuild scan concurrency
        required: false
        default: "6"

jobs:
  rebuild:
    name: Rebuild map image tiles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate inputs
        env:
          DELETE_EXISTING: ${{ inputs.delete_existing }}
        run: |
          test -n "${{ secrets.PLUGIN_TOKEN }}" || (echo "Missing PLUGIN_TOKEN secret" && exit 1)
          if [ "$DELETE_EXISTING" != "true" ]; then
            echo "Set delete_existing=true to delete stale map tiles and rebuild from z4."
            exit 1
          fi
      - name: Delete stale tiles and rebuild from z4
        env:
          PLUGIN_TOKEN: ${{ secrets.PLUGIN_TOKEN }}
          WORKER_URL: ${{ inputs.worker_url }}
          WORLD: ${{ inputs.world }}
          DIMENSION: ${{ inputs.dimension }}
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          args=(rebuild --worker-url "$WORKER_URL" --delete-existing --concurrency "$CONCURRENCY" --request-timeout-ms 60000 --request-retries 5)
          if [ -n "$WORLD" ]; then
            args+=(--world "$WORLD")
          fi
          if [ -n "$DIMENSION" ]; then
            args+=(--dimension "$DIMENSION")
          fi
          node scripts/audit-map-tiles.mjs "${args[@]}"
