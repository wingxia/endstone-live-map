name: deploy-worker

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build frontend
        run: npm run build -w web
      - name: Validate Cloudflare configuration
        run: |
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "${{ secrets.PLUGIN_TOKEN }}" || (echo "Missing PLUGIN_TOKEN secret" && exit 1)
          test -n "${{ vars.CLOUDFLARE_HYPERDRIVE_ID }}" || (echo "Missing CLOUDFLARE_HYPERDRIVE_ID repository variable" && exit 1)
      - name: Inject Hyperdrive id
        working-directory: worker
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          config = Path("wrangler.jsonc")
          text = config.read_text()
          text = text.replace("REPLACE_WITH_HYPERDRIVE_ID", os.environ["CLOUDFLARE_HYPERDRIVE_ID"])
          config.write_text(text)
          PY
        env:
          CLOUDFLARE_HYPERDRIVE_ID: ${{ vars.CLOUDFLARE_HYPERDRIVE_ID }}
      - name: Deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: Set Worker secrets
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PLUGIN_TOKEN: ${{ secrets.PLUGIN_TOKEN }}
          MARKER_WRITE_TOKEN: ${{ secrets.MARKER_WRITE_TOKEN }}
        run: |
          printf '%s' "$PLUGIN_TOKEN" | npx wrangler secret put PLUGIN_TOKEN
          if [ -n "$MARKER_WRITE_TOKEN" ]; then
            printf '%s' "$MARKER_WRITE_TOKEN" | npx wrangler secret put MARKER_WRITE_TOKEN
          fi
