name: provision-cloudflare

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  provision:
    name: Provision Cloudflare DNS and Hyperdrive
    runs-on: ubuntu-24.04
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LIVEMAP_MYSQL_PASSWORD: ${{ secrets.LIVEMAP_MYSQL_PASSWORD }}
      BUHE_LI_ZONE_ID: c7f1c314e35c90342e4b33cd73a2c417
      NAS_TUNNEL_ID: df33fe60-d3e3-4630-83c5-812ba3027696
      MYSQL_HOSTNAME: mysql-map.buhe.li
      MYSQL_DATABASE: endstone_live_map
      MYSQL_USER: endstone_map_worker
      HYPERDRIVE_NAME: endstone-live-map-mysql
      SKIP_TUNNEL_INGRESS: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Validate secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "$LIVEMAP_MYSQL_PASSWORD" || (echo "Missing LIVEMAP_MYSQL_PASSWORD secret" && exit 1)
      - name: Install dependencies
        run: npm ci
      - name: Upsert tunnel ingress and DNS
        run: node scripts/provision-cloudflare.mjs
      - name: Create or update Hyperdrive
        working-directory: worker
        run: |
          set -euo pipefail
          if ! NO_COLOR=1 npx wrangler hyperdrive list | grep -q "$HYPERDRIVE_NAME"; then
            for attempt in 1 2 3 4 5; do
              if NO_COLOR=1 npx wrangler hyperdrive create "$HYPERDRIVE_NAME" \
                --origin-scheme mysql \
                --origin-host "$MYSQL_HOSTNAME" \
                --origin-port 3306 \
                --database "$MYSQL_DATABASE" \
                --origin-user "$MYSQL_USER" \
                --origin-password "$LIVEMAP_MYSQL_PASSWORD" \
                --sslmode REQUIRED \
                --origin-connection-limit 5 \
                --caching-disabled; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                exit 1
              fi
              sleep 20
            done
          fi
          HD_ID="$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/hyperdrive/configs" | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => { const body = JSON.parse(data); const item = body.result.find((entry) => entry.name === process.env.HYPERDRIVE_NAME); if (!item) process.exit(2); console.log(item.id); });")"
          echo "Hyperdrive id: $HD_ID"
          gh variable set CLOUDFLARE_HYPERDRIVE_ID --repo "$GITHUB_REPOSITORY" --body "$HD_ID"
        env:
          GH_TOKEN: ${{ github.token }}
