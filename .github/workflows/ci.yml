name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp-core:
    name: C++ core tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install C++ dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Configure
        run: cmake -S plugin -B plugin/build-core -GNinja -DLIVE_MAP_WITH_ENDSTONE=OFF
      - name: Build
        run: cmake --build plugin/build-core
      - name: Test
        run: ctest --test-dir plugin/build-core --output-on-failure

  endstone-plugin:
    name: Endstone plugin build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install C++ dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang libc++-dev libc++abi-dev libcurl4-openssl-dev
      - name: Configure
        run: cmake -S plugin -B plugin/build-endstone -GNinja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DLIVE_MAP_WITH_ENDSTONE=ON -DENDSTONE_API_VERSION=0.11.3
      - name: Build
        run: cmake --build plugin/build-endstone --target endstone_live_map
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: endstone-live-map-plugin-linux-x86_64
          path: |
            plugin/build-endstone/*.so
            plugin/build-endstone/**/*.so
          if-no-files-found: error

  web-worker:
    name: Worker and frontend tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Unit tests
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: E2E tests
        run: npm run test:e2e
