name: map-tile-backfill-job

on:
  workflow_dispatch:
    inputs:
      worker_url:
        description: Worker URL
        required: true
        default: https://map.buhe.li
      action:
        description: start, status, step, pause, resume, or cancel
        required: true
        default: status
      world:
        description: Optional world filter
        required: false
        default: ""
      dimension:
        description: Optional dimension filter
        required: false
        default: ""
      zooms:
        description: Comma-separated low zooms to rebuild
        required: false
        default: "-1,0,1,2,3"
      include_regions:
        description: Scan chunk-regions/v1
        required: true
        type: boolean
        default: true
      include_direct:
        description: Scan chunks/v1
        required: true
        type: boolean
        default: true
      replace:
        description: Replace the active job when starting
        required: true
        type: boolean
        default: false

jobs:
  job:
    name: Control slow low zoom backfill job
    runs-on: ubuntu-24.04
    steps:
      - name: Validate token
        run: test -n "${{ secrets.PLUGIN_TOKEN }}" || (echo "Missing PLUGIN_TOKEN secret" && exit 1)
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Call Worker
        env:
          PLUGIN_TOKEN: ${{ secrets.PLUGIN_TOKEN }}
          WORKER_URL: ${{ inputs.worker_url }}
          ACTION: ${{ inputs.action }}
          WORLD: ${{ inputs.world }}
          DIMENSION: ${{ inputs.dimension }}
          ZOOMS: ${{ inputs.zooms }}
          INCLUDE_REGIONS: ${{ inputs.include_regions }}
          INCLUDE_DIRECT: ${{ inputs.include_direct }}
          REPLACE: ${{ inputs.replace }}
        run: |
          node <<'NODE'
          const workerUrl = process.env.WORKER_URL.replace(/\/+$/, "");
          const action = process.env.ACTION || "status";
          const payload = {
            action,
            includeRegions: process.env.INCLUDE_REGIONS === "true",
            includeDirect: process.env.INCLUDE_DIRECT === "true",
            replace: process.env.REPLACE === "true",
          };
          if (process.env.WORLD) payload.world = process.env.WORLD;
          if (process.env.DIMENSION) payload.dimension = process.env.DIMENSION;
          if (process.env.ZOOMS) {
            payload.zooms = process.env.ZOOMS.split(",").map((value) => Number(value.trim())).filter((value) => Number.isFinite(value));
          }
          const response = await fetch(`${workerUrl}/api/plugin/map-tiles/backfill-job`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${process.env.PLUGIN_TOKEN}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });
          const body = await response.text();
          console.log(body);
          if (!response.ok) {
            process.exitCode = 1;
          }
          NODE
